<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>عيد ميلاد سعيد</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="confetti-wrap" id="confettiWrap"></div>

  <canvas id="burstCanvas"></canvas>

  <audio id="birthdaySong" src="songg.mp3" preload="auto"></audio>

  <div class="start-screen" id="startScreen">
    <div class="terminal">
      <div class="terminal-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-bar-title">birthday_hack.sh — bash</span>
      </div>
      <div class="terminal-body" id="terminalBody">
      </div>
    </div>
    <button class="btn-start" id="btnStart">[ ENTER ]</button>
  </div>

  <div class="card-wrapper">
    <p class="title">> birthday_card.sh --open</p>
    <p class="hint">scratch to decrypt the message</p>

    <div class="scratch-container" id="scratchContainer">
      <div class="reveal-layer">
        <img id="friendsPhoto" class="friends-photo" alt="صورة الأصدقاء" />
        <span class="emoji-big">🎂</span>
        <p class="msg-main">كل عام وأنت بخير</p>
        <p class="msg-sub">ابو سمرة الحب كل عام وانت بالف الف الف خير يا بعد عمري ❤️ عقبال المية يارب و إن شاء الله بشوفك باعلى المراتب هكري المفضل 👨🏿‍💻</p>
      </div>
      <canvas id="scratchCanvas"></canvas>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="btn-celebrate" id="btnCelebrate" onclick="launchFireworks()">
    🎆 CELEBRATE
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
