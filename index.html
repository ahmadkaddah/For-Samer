<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>عيد ميلاد سعيد 🎂</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      min-height: -webkit-fill-available;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      color: #fff;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: fall linear infinite;
      will-change: transform;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .card-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px 12px 24px;
      width: 100%;
      max-width: 420px;
    }

    .title {
      font-size: clamp(1.3rem, 6vw, 2rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffd700, #ff69b4, #7b68ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.5); }
    }

    .hint {
      font-size: clamp(0.8rem, 3.5vw, 0.95rem);
      color: #aaa;
      text-align: center;
    }

.friends-photo {
      width: clamp(90px, 22vw, 130px);
      height: clamp(90px, 22vw, 130px);
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffd700;
      box-shadow:
        0 0 0 3px rgba(255,105,180,0.5),
        0 0 18px rgba(255,215,0,0.8),
        0 0 36px rgba(255,105,180,0.4);
      display: block;
      background: #1a0533; /* placeholder bg while loading */
    }

    .scratch-container {
      position: relative;
      width: min(320px, 88vw);
      height: min(460px, 118vw);      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255,215,0,0.25), 0 0 70px rgba(255,105,180,0.12);
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
      will-change: transform;
      transform: translateZ(0);
    }

    .reveal-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a0533, #0d1a3a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 22px 20px;
      text-align: center;
    }

    .friends-photo {
      width: clamp(120px, 45%, 160px);
      height: clamp(120px, 45%, 160px);
      border-radius: 12px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .reveal-layer .emoji-big {
      font-size: clamp(2.6rem, 10vw, 4.2rem);
      line-height: 1;
    }

    .reveal-layer .msg-main {
      font-size: clamp(1.2rem, 5vw, 1.65rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ffd700, #ff69b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }

    .reveal-layer .msg-sub {
      font-size: clamp(0.78rem, 3vw, 0.95rem);
      color: #c8a8ff;
      line-height: 1.75;
      padding: 0 4px;
    }

    .heart-beat {
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      animation: heartbeat 1s ease-in-out infinite;
      display: inline-block;
      line-height: 1;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1);   }
      14%       { transform: scale(1.35); }
      28%       { transform: scale(1);   }
      42%       { transform: scale(1.2); }
      70%       { transform: scale(1);   }
    }

    #scratchCanvas {
      position: absolute;
      inset: 0;
      touch-action: none;
      /* prevent iOS callout on long press */
      -webkit-touch-callout: none;
    }

    .progress-wrap {
      width: min(320px, 88vw);
      height: 7px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #ffd700, #ff69b4);
      transition: width 0.15s ease;
      will-change: width;
    }

    .btn-celebrate {
      display: none;
      padding: 13px 36px;
      font-size: clamp(0.9rem, 4vw, 1rem);
      font-weight: 700;
      border: none;
      border-radius: 99px;
      background: linear-gradient(135deg, #ffd700, #ff69b4);
      color: #1a0533;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(255,105,180,0.5);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
      animation: glow 1.5s ease-in-out infinite;
    }
    .btn-celebrate:active { transform: scale(0.96); }

    #burstCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="confetti-wrap" id="confettiWrap"></div>
  <canvas id="burstCanvas"></canvas>
  <audio id="birthdaySong" src="songg.mp3" preload="auto"></audio>

  <div class="card-wrapper">
    <p class="title">🎉 عيد ميلاد سعيد 🎉</p>
    <p class="hint">حك هنا لترى المفاجأة ✨</p>

    <div class="scratch-container" id="scratchContainer">
      <div class="reveal-layer">
        <img id="friendsPhoto" class="friends-photo" alt="صورة الأصدقاء" />
        <span class="emoji-big">🎂</span>
        <p class="msg-main">كل عام وأنت بخير</p>
        <p class="msg-sub">ابو سمرة الحب كل عام وانت بالف الف الف خير يا بعد عمري ❤️ عقبال المية يارب و إن شاء الله بشوفك باعلى المراتب هكري المفضل 👨🏿‍💻</p>

      </div>
      <canvas id="scratchCanvas"></canvas>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="btn-celebrate" id="btnCelebrate" onclick="launchFireworks()">
      🎆 اضغط هنا لنحتفل
    </button>
  </div>

<script>

(function loadPhoto() {
  const img = document.getElementById('friendsPhoto');
  const names = ['photoo.png', 'photoo.jpg'];
  let idx = 0;
  function tryNext() {
    if (idx >= names.length) return;
    img.onerror = () => { idx++; tryNext(); };
    img.onload  = () => {};
    img.src = names[idx];
  }
  tryNext();
})();


(function spawnConfetti() {
  const wrap   = document.getElementById('confettiWrap');
  const colors = ['#ffd700','#ff69b4','#7b68ee','#00cfff','#ff4500','#adff2f'];
  const count  = window.innerWidth < 500 ? 28 : 50;
  for (let i = 0; i < count; i++) {
    const el   = document.createElement('div');
    el.className = 'dot';
    const size = Math.random() * 9 + 4;
    el.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*6+5}s;
      animation-delay:${Math.random()*8}s;
    `;
    wrap.appendChild(el);
  }
})();

const canvas       = document.getElementById('scratchCanvas');
const ctx          = canvas.getContext('2d', { willReadFrequently: true });
const container    = document.getElementById('scratchContainer');
const progressBar  = document.getElementById('progressBar');
const btnCelebrate = document.getElementById('btnCelebrate');
const song         = document.getElementById('birthdaySong');

let isDrawing  = false;
let revealed   = false;
let frameCount = 0;

function initCanvas() {
  const rect   = container.getBoundingClientRect();
  const dpr    = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  drawScratchLayer(rect.width, rect.height);
}

function drawScratchLayer(w, h) {
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0,   '#b0b0c0');
  grad.addColorStop(0.3, '#d8d8e8');
  grad.addColorStop(0.6, '#9090a8');
  grad.addColorStop(1,   '#c0c0d0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font      = `bold ${Math.floor(w * 0.07)}px Segoe UI, Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('اِحك هنا 🪙', w / 2, h / 2);
  ctx.restore();
}

function scratch(x, y) {
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  const r = window.matchMedia('(pointer: coarse)').matches ? 32 : 26;
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  frameCount++;
  if (frameCount % 4 === 0) checkProgress();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top,
    };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function checkProgress() {
  if (revealed) return;
  const w    = canvas.width;
  const h    = canvas.height;
  const data = ctx.getImageData(0, 0, w, h).data;
  let transparent = 0;
  let total = 0;
  for (let i = 3; i < data.length; i += 16) {
    if (data[i] < 128) transparent++;
    total++;
  }
  const pct = Math.min(100, Math.round((transparent / total) * 100));
  progressBar.style.width = pct + '%';

  if (pct >= 80) {
    revealed = true;
    canvas.style.transition = 'opacity 0.8s ease';
    canvas.style.opacity    = '0';
    setTimeout(() => { canvas.style.display = 'none'; }, 800);
    progressBar.style.width = '100%';
    btnCelebrate.style.display = 'block';
    song.play().catch(() => {});
  }
}

canvas.addEventListener('mousedown',  e => { isDrawing = true;  const p = getPos(e); scratch(p.x, p.y); });
canvas.addEventListener('mousemove',  e => { if (isDrawing) { const p = getPos(e); scratch(p.x, p.y); } });
canvas.addEventListener('mouseup',    () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });

canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true;  const p = getPos(e); scratch(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (isDrawing) { const p = getPos(e); scratch(p.x, p.y); } }, { passive: false });
canvas.addEventListener('touchend',   () => { isDrawing = false; });
canvas.addEventListener('touchcancel',() => { isDrawing = false; });

window.addEventListener('resize', initCanvas);
initCanvas();

const burstCanvas = document.getElementById('burstCanvas');
const bCtx        = burstCanvas.getContext('2d');
let   particles   = [];
let   animId      = null;
const isMobile    = window.innerWidth < 600;

function resizeBurst() {
  burstCanvas.width  = window.innerWidth;
  burstCanvas.height = window.innerHeight;
}
resizeBurst();
window.addEventListener('resize', resizeBurst);

function createBurst(x, y) {
  const palettes = [
    ['#ffd700','#ffaa00','#fff7a0'],
    ['#ff69b4','#ff1493','#ffb6d9'],
    ['#7b68ee','#4a3fbf','#c4baff'],
    ['#00cfff','#0077ff','#a0e8ff'],
    ['#ff4500','#ff6a00','#ffbb80'],
    ['#adff2f','#39ff14','#d4ffaa'],
  ];
  const palette = palettes[Math.floor(Math.random() * palettes.length)];
  const count = isMobile ? 55 : 90;

  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
    const speed = Math.random() * 7 + 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color: palette[Math.floor(Math.random() * palette.length)],
      size:  Math.random() * 3.5 + 1.5,
      isStar: Math.random() < 0.3,
      gravity: 0.07 + Math.random() * 0.06,
      decay:   0.016 + Math.random() * 0.008,
      px: x, py: y,
    });
  }
}

function drawStar(x, y, r, color, alpha) {
  bCtx.globalAlpha = alpha;
  bCtx.fillStyle   = color;
  bCtx.beginPath();
  for (let s = 0; s < 10; s++) {
    const rad = s % 2 === 0 ? r : r * 0.42;
    const a   = (Math.PI / 5) * s - Math.PI / 2;
    s === 0
      ? bCtx.moveTo(x + rad * Math.cos(a), y + rad * Math.sin(a))
      : bCtx.lineTo(x + rad * Math.cos(a), y + rad * Math.sin(a));
  }
  bCtx.closePath();
  bCtx.fill();
}

function animateBurst() {
  bCtx.globalAlpha = 0.22;
  bCtx.fillStyle   = '#0d0d1a';
  bCtx.fillRect(0, 0, burstCanvas.width, burstCanvas.height);
  bCtx.globalAlpha = 1;

  const alive = [];
  for (let k = 0; k < particles.length; k++) {
    const p = particles[k];
    if (p.alpha <= 0.01) continue;
    alive.push(p);

    bCtx.globalAlpha = p.alpha * 0.35;
    bCtx.strokeStyle = p.color;
    bCtx.lineWidth   = p.size * 0.7;
    bCtx.beginPath();
    bCtx.moveTo(p.px, p.py);
    bCtx.lineTo(p.x,  p.y);
    bCtx.stroke();

    if (p.isStar) {
      drawStar(p.x, p.y, p.size + 1, p.color, p.alpha);
    } else {
      bCtx.globalAlpha = p.alpha;
      bCtx.fillStyle   = p.color;
      bCtx.beginPath();
      bCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      bCtx.fill();
    }

    p.px  = p.x;
    p.py  = p.y;
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.985;
    p.alpha -= p.decay;
  }

  particles = alive;

  if (particles.length > 0) {
    animId = requestAnimationFrame(animateBurst);
  } else {
    cancelAnimationFrame(animId);
    bCtx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
  }
}

function launchFireworks() {
  const w = burstCanvas.width;
  const h = burstCanvas.height;
  const spots = [
    [w * 0.25, h * 0.28],
    [w * 0.75, h * 0.28],
    [w * 0.5,  h * 0.16],
    [w * 0.15, h * 0.48],
    [w * 0.85, h * 0.48],
    [w * 0.4,  h * 0.36],
    [w * 0.6,  h * 0.36],
  ];
  let i = 0;
  const rounds = isMobile ? 2 : 3;
  function fire() {
    if (i >= spots.length * rounds) return;
    const [x, y] = spots[i % spots.length];
    createBurst(x + (Math.random()-0.5)*90, y + (Math.random()-0.5)*70);
    i++;
    setTimeout(fire, isMobile ? 180 : 140);
  }
  fire();
  cancelAnimationFrame(animId);
  animateBurst();
}
</script>
</body>
</html>
